<!-- ==============================================
     TEMPLATE A: FLOATING 3D ISOMETRIC NODE 
     ============================================== -->
<template id="floating-node-template">
    <div class="floating-node {glow-class}" id="device-{id}" data-id="{id}">
        <!-- Platform that looks 3D -->
        <div class="floating-platform"></div>
        <!-- Actual Icon Standing Up -->
        <i class="fa-solid {icon} floating-icon"></i>
        <!-- Label beneath -->
        <div class="floating-label">{name}</div>
        <!-- Connection Status -->
        <div class="floating-status status-{status}"></div>
    </div>
</template>

<template id="internet-node-template">
    <div class="floating-node glow-internet internet-node" id="device-{id}" data-id="{id}">
        <img src="{image_url}" class="floating-device-image" draggable="false">
        <div class="floating-label">{name}</div>
        <div class="floating-status status-{status}"></div>
        <div class="hardware-hover-card">
            <div><strong>{name}</strong></div>
            <div>{ip}</div>
            <div>Type: {type-label}</div>
            <div>Status: {status}</div>
            <div>Response: {response-label}</div>
        </div>
    </div>
</template>

<!-- ==============================================
     TEMPLATE B: HORIZONTAL WIDE SERVER CARD 
     ============================================== -->
<template id="wide-server-template">
    <div class="wide-server-card" id="device-{id}" data-id="{id}">
        <!-- Status Dot in corner -->
        <div class="floating-status status-{status}" style="top: 12px; right: 12px;"></div>
        
        <div class="wide-card-header">
            <div class="wide-card-icon">
                <i class="fa-solid {icon}"></i>
            </div>
            <div class="wide-card-info">
                <div class="wide-card-title" title="{name}">{name}</div>
            </div>
        </div>
    </div>
</template>

<!-- TEMPLATE C: RACKMOUNT HARDWARE (Used for Switches/Routers) -->
<template id="rackmount-hardware-template">
    <div class="rackmount-node {glow-class}" id="device-{id}" data-id="{id}">
        <div class="hardware-base-glow"></div>
        <div class="hardware-title">{name}</div>
        <img src="{image_url}" class="hardware-image" draggable="false">
        <div class="hardware-ip">{ip}</div>
        <div class="floating-status status-{status}"></div>
        <div class="hardware-hover-card">
            <div><strong>{name}</strong></div>
            <div>{ip}</div>
            <div>Type: {type-label}</div>
            <div>Status: {status}</div>
            <div>Response: {response-label}</div>
        </div>
        <div class="glow-point" style="top: 20%; right: 20%;"></div>
    </div>
</template>

<template id="wireless-ap-template">
    <div class="wireless-ap-node {glow-class}" id="device-{id}" data-id="{id}">
        <div class="wireless-ap-image-wrap">
            <img src="{image_url}" class="wireless-ap-image" draggable="false">
            <div class="wireless-status-badge status-{status}">
                <i class="fa-solid fa-wifi wireless-status-icon"></i>
            </div>
        </div>
        <div class="floating-label">{name}</div>
        <div class="wireless-hover-card">
            <div><strong>{name}</strong></div>
            <div>{ip}</div>
            <div>Type: {type-label}</div>
            <div>Status: {status}</div>
            <div>Response: {response-label}</div>
        </div>
    </div>
</template>

<!-- ==============================================
     PREMIUM DEVICE DETAIL MODAL 
     ============================================== -->
<div id="premium-device-modal" class="premium-modal-overlay">
    <div class="premium-modal-content">
        <div class="premium-modal-header">
            <div class="premium-modal-status-badge" id="modal-device-status-badge">
                <span class="pulse-indicator" id="modal-status-pulse"></span>
                <span id="modal-status-text">Online</span>
            </div>
            <button class="premium-modal-close" onclick="closePremiumModal()">×</button>
        </div>
        
        <div class="premium-modal-body">
            <div class="premium-modal-device-icon" id="modal-device-icon">🔀</div>
            <h2 class="premium-modal-device-name" id="modal-device-name">Device Name</h2>
            <div class="premium-modal-device-ip" id="modal-device-ip">192.168.1.1</div>
            
            <div class="premium-modal-stats-grid">
                <div class="premium-stat-item">
                    <div class="premium-stat-label">Response Time</div>
                    <div class="premium-stat-value"><span id="modal-response-time">45</span> ms</div>
                </div>
                <div class="premium-stat-item">
                    <div class="premium-stat-label">Model/Type</div>
                    <div class="premium-stat-value" id="modal-device-type">Switch</div>
                </div>
                <div class="premium-stat-item">
                    <div class="premium-stat-label">Location</div>
                    <div class="premium-stat-value" id="modal-device-location">Rack A-01</div>
                </div>
                <div class="premium-stat-item">
                    <div class="premium-stat-label">Last Checked</div>
                    <div class="premium-stat-value" id="modal-last-check">2 mins ago</div>
                </div>
            </div>
            
            <div class="premium-modal-actions">
                <button class="btn-premium-action primary" onclick="viewDeviceDashboard()">
                    <i class="fas fa-chart-line"></i> Performance Dashboard
                </button>
                <button class="btn-premium-action secondary" onclick="closePremiumModal()">
                    Dismiss
                </button>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Shared Premium Modal Logic
 * Used by sub_topology_view.js and premium_topology.js
 */
let _currentPremiumModalDeviceId = null;

function showPremiumDeviceDetails(device) {
    if (!device) return;
    
    _currentPremiumModalDeviceId = device.id;
    const modal = document.getElementById('premium-device-modal');
    if (!modal) return;

    // Icon Mapping
    const type = (device.device_type || 'server').toLowerCase();
    const icons = {
        'router': '🌐', 'internet': '☁️', 'switch': '🔀', 'server': '🖥️', 'firewall': '🛡️',
        'wireless': '📶', 'website': '🌐', 'web': '🌐', 'vmware': '🖴', 'ippbx': '☎️',
        'cctv': '📹', 'vpnrouter': '🔒', 'dns': '🔍', 'other': '⚙️'
    };
    
    // Status Logic
    const status = (device.status || 'unknown').toLowerCase();
    const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
    const badge = document.getElementById('modal-device-status-badge');
    
    // Populate Modal
    document.getElementById('modal-device-name').textContent = device.name;
    document.getElementById('modal-device-ip').textContent = device.ip_address || 'N/A';
    document.getElementById('modal-device-icon').textContent = icons[type] || '⚙️';
    document.getElementById('modal-status-text').textContent = statusLabel;
    
    const rt = device.response_time != null ? device.response_time : (device.ping != null ? device.ping : '--');
    document.getElementById('modal-response-time').textContent = rt;
    
    document.getElementById('modal-device-type').textContent = type.charAt(0).toUpperCase() + type.slice(1);
    document.getElementById('modal-device-location').textContent = device.location || 'Unknown';
    
    // Last Check Logic
    const lastCheck = device.last_check || device.last_seen;
    document.getElementById('modal-last-check').textContent = lastCheck ? _formatPremiumRelativeTime(lastCheck) : 'Never';

    // Apply Status Classes
    if (badge) {
        badge.className = 'premium-modal-status-badge ' + (status === 'down' || status === 'offline' ? 'offline' : (status === 'slow' ? 'slow' : ''));
    }
    
    // Show Modal
    modal.classList.add('active');
}

function closePremiumModal() {
    const modal = document.getElementById('premium-device-modal');
    if (modal) modal.classList.remove('active');
    _currentPremiumModalDeviceId = null;
}

function viewDeviceDashboard() {
    if (!_currentPremiumModalDeviceId) return;
    window.location.href = `/devices?highlight_device=${_currentPremiumModalDeviceId}`;
}

function _formatPremiumRelativeTime(dateStr) {
    try {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        if (isNaN(diff)) return dateStr;
        if (diff < 60) return 'Just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return date.toLocaleDateString();
    } catch (e) {
        return dateStr;
    }
}
</script>
