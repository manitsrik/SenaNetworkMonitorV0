components:
  parameters:
    DeviceId:
      name: device_id
      in: path
      required: true
      schema: { type: integer }
    DashboardId:
      name: dashboard_id
      in: path
      required: true
      schema: { type: integer }
    SubTopoId:
      name: sub_topo_id
      in: path
      required: true
      schema: { type: integer }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: integer }

  schemas:
    Device:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        ip_address: { type: string }
        device_type: { type: string }
        location: { type: string }
        monitor_type: { type: string, enum: [ping, http, snmp, tcp, dns] }
        status: { type: string, enum: [up, down, unknown] }
        response_time: { type: number }
        last_check: { type: string, format: date-time }

    DeviceCreate:
      type: object
      required: [name, ip_address]
      properties:
        name: { type: string }
        ip_address: { type: string }
        device_type: { type: string }
        location: { type: string }
        monitor_type: { type: string, enum: [ping, http, snmp, tcp, dns], default: ping }
        snmp_community: { type: string }
        snmp_port: { type: integer, default: 161 }
        snmp_version: { type: string, enum: ["1", "2c", "3"] }
        tcp_port: { type: integer }
        dns_query_domain: { type: string }
        location_type: { type: string, enum: [on-premise, cloud] }

    UserCreate:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
        role: { type: string, enum: [admin, operator, viewer], default: viewer }
        display_name: { type: string }
        email: { type: string, format: email }
